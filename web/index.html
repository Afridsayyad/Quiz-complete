<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Quiz Game</title>
  <link rel="stylesheet" href="base.css">
  <link rel="stylesheet" href="index.css">
</head>
<body class="login-page">
  <main class="login-card autumn-card">
    <h1>Quiz Login</h1>
    <p class="subtitle">Welcome back. Continue your quiz journey.</p>

    <form id="loginForm" novalidate>
      <input id="email" type="email" placeholder="Email ID" required>
      <input id="password" type="password" placeholder="Password" required minlength="4">
      <button id="loginSubmitBtn" type="submit">Login</button>
      <a href="#" id="forgotLink" class="forgot-link">Forgot Password?</a>
      <p class="signup-row">Don't have an account? <button id="openSignupLink" class="signup-link-btn" type="button">Sign Up</button></p>
    </form>
  </main>

  <div id="signupModal" class="auth-modal hidden">
    <div class="auth-panel">
      <h2>Create Account</h2>
      <form id="signupForm" novalidate>
        <input id="signupName" type="text" placeholder="Full Name" required>
        <input id="signupEmail" type="email" placeholder="Email ID" required>
        <input id="signupPassword" type="password" placeholder="Password" required minlength="4">
        <input id="signupConfirmPassword" type="password" placeholder="Confirm Password" required minlength="4">
        <p class="otp-status info">A verification email will be sent after signup.</p>
        <button id="signupSubmitBtn" type="submit">Sign Up</button>
      </form>
      <button id="signupCloseBtn" class="close-btn" type="button">Close</button>
    </div>
  </div>

  <div id="forgotModal" class="auth-modal hidden">
    <div class="auth-panel">
      <h2>Reset Password</h2>
      <form id="forgotForm" novalidate>
        <input id="forgotEmail" type="email" placeholder="Registered Email ID" required>
        <p id="forgotStatus" class="otp-status" aria-live="polite"></p>
        <button id="forgotSubmitBtn" type="submit">Send Reset Link</button>
      </form>
      <button id="forgotCloseBtn" class="close-btn" type="button">Close</button>
    </div>
  </div>

  <script type="module">
    const $ = (id) => document.getElementById(id);
    import {
      registerUser,
      loginUser,
      fetchUserDoc,
      sendPasswordResetLink,
      sendVerificationEmail
    } from "./firebase-service.js";

    const EMAIL_REGEX = /^[A-Za-z0-9+_.-]+@[A-Za-z0-9.-]+$/;
    const USER_UID_KEY = "quiz_user_uid";
    const USER_EMAIL_KEY = "quiz_user_email";
    const USER_FULL_NAME_KEY = "quiz_user_full_name";
    const loginForm = $("loginForm");
    const signupForm = $("signupForm");
    const forgotForm = $("forgotForm");
    const forgotLink = $("forgotLink");
    const openSignupLink = $("openSignupLink");
    const signupModal = $("signupModal");
    const signupCloseBtn = $("signupCloseBtn");
    const forgotModal = $("forgotModal");
    const forgotCloseBtn = $("forgotCloseBtn");
    const emailInput = $("email");
    const passwordInput = $("password");
    const loginSubmitBtn = $("loginSubmitBtn");
    const signupNameInput = $("signupName");
    const signupEmailInput = $("signupEmail");
    const signupPasswordInput = $("signupPassword");
    const signupConfirmPasswordInput = $("signupConfirmPassword");
    const signupSubmitBtn = $("signupSubmitBtn");
    const forgotEmailInput = $("forgotEmail");
    const forgotSubmitBtn = $("forgotSubmitBtn");
    const forgotStatus = $("forgotStatus");
    const normalize = (v) => (v == null ? "" : String(v).trim());
    const validCreds = (email, password) => EMAIL_REGEX.test(email) && password && password.length >= 4;
    const setSubmitting = (btn, on, idle, busy) => {
      if (!btn) return;
      btn.disabled = on;
      btn.textContent = on ? busy : idle;
      btn.style.opacity = on ? "0.75" : "1";
    };
    const storeSession = (user, data) => {
      if (!user) return;
      localStorage.setItem(USER_UID_KEY, user.uid);
      localStorage.setItem(USER_EMAIL_KEY, user.email || "");
      const name = (data && data.fullName) || user.displayName || "";
      if (name) localStorage.setItem(USER_FULL_NAME_KEY, name);
    };

    const showForgotOtpStatus = (message, state = "info") => {
      if (!forgotStatus) return;
      forgotStatus.textContent = message || "";
      forgotStatus.className = `otp-status ${state}`;
    };

    async function handleSignup(event) {
      event.preventDefault();
      setSubmitting(signupSubmitBtn, true, "Sign Up", "Creating Account...");
      try {
        const fullName = normalize(signupNameInput.value);
        const email = normalize(signupEmailInput.value);
        const password = signupPasswordInput.value;
        const confirmPassword = signupConfirmPasswordInput.value;
        if (!fullName) return alert("Please enter your full name.");
        if (!validCreds(email, password)) return alert("Enter a valid email and password.");
        if (password !== confirmPassword) return alert("Password and confirm password must match.");
        const user = await registerUser({ fullName, email, password });
        alert(
          `Account created. A verification link has been sent to ${user.email}. Please verify and then log in.`
        );
        signupModal.classList.add("hidden");
        signupForm.reset();
      } catch (error) {
        const message = (error && error.message) || "Unable to sign up right now.";
        alert(message.replace("Firebase: ", ""));
      } finally {
        setSubmitting(signupSubmitBtn, false, "Sign Up", "Create Account");
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      setSubmitting(loginSubmitBtn, true, "Login", "Signing in...");
      try {
        const email = normalize(emailInput.value);
        const password = passwordInput.value;
        if (!validCreds(email, password)) return alert("Enter a valid email and password.");
        const user = await loginUser({ email, password });
        const userDoc = await fetchUserDoc(user.uid);
        storeSession(user, userDoc);
        window.location.href = "start.html";
      } catch (error) {
        const code = (error && error.code) || "";
        const message = (error && error.message) || "";
        if (code === "auth/email-not-verified") {
          const resend = confirm(
            "Email not verified. Check your inbox (and spam). Resend verification email?"
          );
          if (resend) {
            try {
              await sendVerificationEmail();
              alert("Verification email sent again.");
            } catch (err) {
              alert("Could not resend verification link right now.");
            }
          }
        } else if (
          code.includes("wrong-password") ||
          code.includes("invalid-credential") ||
          message.includes("wrong-password") ||
          message.includes("invalid-credential")
        ) {
          alert("Wrong password.");
        } else if (code.includes("user-not-found") || message.includes("user-not-found")) {
          alert("Email not registered.");
        } else if (message) {
          alert(message.replace("Firebase: ", ""));
        } else {
          alert("Login failed. Please try again.");
        }
      } finally {
        setSubmitting(loginSubmitBtn, false, "Login", "Login");
      }
    }

    async function handleForgotSubmit(event) {
      event.preventDefault();
      const email = normalize(forgotEmailInput.value);
      if (!EMAIL_REGEX.test(email)) return alert("Enter a valid email.");
      setSubmitting(forgotSubmitBtn, true, "Send Reset Link", "Sending...");
      try {
        await sendPasswordResetLink(email);
        showForgotOtpStatus("Reset link sent. Check your email inbox (and spam).", "success");
      } catch (error) {
        const message = (error && error.message) || "Unable to send reset link right now.";
        showForgotOtpStatus(message.replace("Firebase: ", ""), "error");
      } finally {
        setSubmitting(forgotSubmitBtn, false, "Send Reset Link", "Send Reset Link");
      }
    }

    const openSignupModal = () => {
      signupForm.reset();
      signupModal.classList.remove("hidden");
    };
    const closeSignupModal = () => signupModal.classList.add("hidden");
    const openForgotModal = () => {
      forgotForm.reset();
      showForgotOtpStatus("", "info");
      forgotModal.classList.remove("hidden");
    };
    const closeForgotModal = () => forgotModal.classList.add("hidden");

    openSignupLink.addEventListener("click", openSignupModal);
    signupCloseBtn.addEventListener("click", closeSignupModal);
    signupModal.addEventListener("click", (event) => event.target === signupModal && closeSignupModal());
    forgotLink.addEventListener("click", (event) => {
      event.preventDefault();
      openForgotModal();
    });
    forgotCloseBtn.addEventListener("click", closeForgotModal);
    forgotModal.addEventListener("click", (event) => event.target === forgotModal && closeForgotModal());
    forgotForm.addEventListener("submit", handleForgotSubmit);
    signupForm.addEventListener("submit", handleSignup);
    loginForm.addEventListener("submit", handleLogin);
  </script>
</body>
</html>
